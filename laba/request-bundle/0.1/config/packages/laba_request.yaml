laba_request:
    api_request_log:
        entity: App\Entity\ApiRequestLog
        excluded_paths:
            - '^(?!/api)'               # все що не /api/*
            - '^/api/api_request_logs'  # сам endpoint логів
        retention: '30 days'            # null — вимкнути очистку
        keep_last_per_path: true        # при очистці зберігати останній запис на кожен path
